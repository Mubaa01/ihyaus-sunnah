      <text x="442" y="25" fill="#63716D" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="1.2">ENROLL</text>
      <text x="442" y="52" fill="#0B3D2E" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Open</text>
